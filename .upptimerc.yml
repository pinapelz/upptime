  cname: uptime.pinapelz.com
  # baseUrl: /your-repo-name
  logoUrl: https://raw.githubusercontent.com/upptime/upptime.js.org/master/static/img/icon.svg
  name: Upptime
  introTitle: "Current Live Operations Status"
  introMessage: The current status of various services, updated every 5 minutes.
    - title: Status
      href: /
    - title: GitHub
      href: https://github.com/$OWNER/$REPO

