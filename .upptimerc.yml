owner: pinapelz # Your GitHub organization or username, where this repository lives
repo: upptime # The name of this repository

sites:
  - name: Phase Tracker
    url: https://phase-tracker.com
  - name: Moekyun Services
    url: https://moekyun.me
  - name: Patchwork Archive
    url: https://patchwork-backend.vercel.app/api/database/status

status-website:
